country_code: None
country_name: None
wpp_name: None

# -------------------------------------------------------
# Census
# -------------------------------------------------------
census:
  year: None
  population_tables: census/country_census_template.xlsx
  pop_totals: pop_totals
  age_dist: age_distribution
  regions: regions
  dist_name_fixes: dist_name_fixes
  cell_patches: cell_patches
  national_label: "{country_name}"

# -------------------------------------------------------
# WPP
# -------------------------------------------------------
wpp:
  country_label: "{wpp_name}"
  header_row: 16
  country_col_index: 2

  enable_annual_pop: True
  init_population_year: 2010

  # Annual population (single-year ages)
  pop_annual_male_file: wpp/WPP2019_INT_F03_2_POPULATION_BY_AGE_ANNUAL_MALE.xlsx
  pop_annual_female_file: wpp/WPP2019_INT_F03_3_POPULATION_BY_AGE_ANNUAL_FEMALE.xlsx
  pop_annual_sheets: [ESTIMATES, MEDIUM VARIANT]
  pop_annual_multiplier: 1000
  pop_annual_age_cols_slice_end: 103

  # 5-year population (F07)
  pop_agegrp_male: wpp/WPP2019_POP_F07_2_POPULATION_BY_AGE_MALE.xlsx
  pop_agegrp_female: wpp/WPP2019_POP_F07_3_POPULATION_BY_AGE_FEMALE.xlsx
  pop_agegrp_sheets: [ESTIMATES, LOW VARIANT, MEDIUM VARIANT, HIGH VARIANT]
  pop_agegrp_multiplier: 1000

  # Fertility
  total_births_file: wpp/WPP2019_FERT_F01_BIRTHS_BOTH_SEXES.xlsx
  sex_ratio_file: wpp/WPP2019_FERT_F02_SEX_RATIO_AT_BIRTH.xlsx
  asfr_file: wpp/WPP2019_FERT_F07_AGE_SPECIFIC_FERTILITY.xlsx
  fert_sheets_all: [ESTIMATES, LOW VARIANT, MEDIUM VARIANT, HIGH VARIANT]
  fert_sheets_est_med: [ESTIMATES, MEDIUM VARIANT]

  # Deaths by age
  deaths_male_file: wpp/WPP2019_MORT_F04_2_DEATHS_BY_AGE_MALE.xlsx
  deaths_female_file: wpp/WPP2019_MORT_F04_3_DEATHS_BY_AGE_FEMALE.xlsx
  deaths_sheets: [ESTIMATES, LOW VARIANT, MEDIUM VARIANT, HIGH VARIANT]
  deaths_multiplier: 1000

  # Abridged life table
  lifetable_male_file: wpp/WPP2019_MORT_F17_2_ABRIDGED_LIFE_TABLE_MALE.xlsx
  lifetable_female_file: wpp/WPP2019_MORT_F17_3_ABRIDGED_LIFE_TABLE_FEMALE.xlsx
  lifetable_sheets: [ESTIMATES, MEDIUM 2020-2050, MEDIUM 2050-2100]
  lifetable_usecols: B,C,H,I,J,K

# -------------------------------------------------------
# DHS
# -------------------------------------------------------
dhs:
  file: dhs/dhs_data.xlsx
  sheet_asfr: ASFR
  sheet_u5: UNDER_5_MORT
  u5_header: 1

# -------------------------------------------------------
# Model
# -------------------------------------------------------
model:
  init_year: 2010
  max_age: 120

# -------------------------------------------------------
# Paths
# -------------------------------------------------------
paths:
  input_dir: inputs
  resources_dir: outputs/resources
  reports_dir: outputs/reports
